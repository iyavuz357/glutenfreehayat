{% extends "base.html" %}

{% block title %}{{ yazi.baslik }} — Gluten Free Hayat{% endblock %}

{% block content %}
{% if yazi.gorsel %}
    <img src="{{ url_for('static', filename='img/uploads/' + yazi.gorsel) }}" 
     alt="{{ yazi.baslik }}"
    style="width:100%; max-height:600px; object-fit:contain; border-radius:12px; margin-bottom:2rem; background:var(--card);">
    {% endif %}

<article style="max-width:750px; margin:0 auto;">
    <span class="tag">{{ yazi.kategori }}</span>
    <h1 style="font-family:'Playfair Display',serif; font-size:2.2rem; color:var(--primary); margin:1rem 0;">
        {{ yazi.baslik }}
    </h1>
    <p style="font-size:0.9rem; color:var(--accent); margin-bottom:2rem;">
        🗓 {{ yazi.tarih | turkce_tarih }}
    </p>
    <div style="line-height:1.9; font-size:1.05rem;">
        {{ yazi.icerik }}
    </div>
    <div style="margin-top:3rem;">
        <a href="/blog" class="btn">← Blog'a Dön</a>
    </div>
</article>

{% endblock %}
