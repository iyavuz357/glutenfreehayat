<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gluten Free Hayat{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Nunito:wght@300;400;700&display=swap" rel="stylesheet">    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header>
    <nav>
        <div class="logo">
            🌾 Gluten Free Hayat
        </div>
        <button class="hamburger" onclick="toggleMenu()" id="hamburger">☰</button>
        <ul id="nav-menu">
            <li><a href="/">Anasayfa</a></li>
            <li><a href="/blog">Blog</a></li>
            <li><a href="/tarifler">Tarifler</a></li>
            <li><a href="/hakkimda">Hakkımda</a></li>
        </ul>
        <form method="GET" action="/ara" class="nav-search">
            <input type="text" name="q" placeholder="Ara...">
            <button type="submit">🔍</button>
        </form>
    </nav>
</header>

<script>
function toggleMenu() {
    const menu = document.getElementById('nav-menu');
    const hamburger = document.getElementById('hamburger');
    menu.classList.toggle('open');
    hamburger.textContent = menu.classList.contains('open') ? '✕' : '☰';
}
</script>
    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>© 2026 Gluten Free Hayat · Sevgiyle 🌿</p>
    </footer>

</body>
</html>
