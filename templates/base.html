<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gluten Free Hayat{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&family=Nunito:wght@300;400;700&display=swap" rel="stylesheet">    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <header>
        <nav>
            <div class="logo">
                🌾 Gluten Free Hayat
            </div>
            <ul>
                <li><a href="/">Anasayfa</a></li>
                <li><a href="/blog">Blog</a></li>
                <li><a href="/tarifler">Tarifler</a></li>
                <li><a href="/hakkimda">Hakkımda</a></li>
            </ul>
<form method="GET" action="/ara" style="display:flex; gap:0.5rem;">
    <input type="text" name="q" placeholder="Ara..." 
           style="padding:0.4rem 0.75rem; border:1px solid var(--border); border-radius:20px; font-size:0.9rem; background:var(--bg); width:150px;">
    <button type="submit" class="btn" style="border:none; cursor:pointer; padding:0.4rem 1rem; font-size:0.9rem;">🔍</button>
</form>
        </nav>
    </header>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>© 2026 Gluten Free Hayat · Sevgiyle 🌿</p>
    </footer>

</body>
</html>
